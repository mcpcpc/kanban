<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In — Kanban</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<script>
(function(){
    var t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', t);
})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --primary: #2563EB;
    --primary-hover: #1D4ED8;
    --primary-muted: rgba(37,99,235,0.08);
    --bg: #F7F7F9;
    --surface: #FFFFFF;
    --text: #18181B;
    --text-muted: #71717A;
    --border: #E4E4E7;
    --danger: #DC2626;
    --danger-bg: #FEF2F2;
    --danger-border: #FECACA;
}
[data-theme="dark"] {
    --bg: #09090B;
    --surface: #111113;
    --text: #FAFAFA;
    --text-muted: #71717A;
    --border: #27272A;
    --danger-bg: #1C0505;
    --danger-border: #991B1B;
    --danger: #FCA5A5;
}

body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    -webkit-font-smoothing: antialiased;
}

.login-wrap {
    width: 100%;
    max-width: 360px;
}

.brand {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    margin-bottom: 2.25rem;
    justify-content: center;
}
.brand-icon { width: 32px; height: 32px; color: var(--primary); }
.brand-name {
    font-size: 1.125rem;
    font-weight: 700;
    letter-spacing: -0.02em;
}

.login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem 1.75rem;
}

.login-title {
    font-size: 1.0625rem;
    font-weight: 600;
    letter-spacing: -0.015em;
    margin-bottom: 0.25rem;
}
.login-sub {
    font-size: 0.84rem;
    color: var(--text-muted);
    margin-bottom: 1.75rem;
}

.field { margin-bottom: 1rem; }
label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 0.3rem;
    letter-spacing: 0.01em;
}
input[type="email"],
input[type="password"] {
    display: block;
    width: 100%;
    padding: 0.525rem 0.75rem;
    font-size: 0.875rem;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    outline: none;
    transition: border-color 0.12s, box-shadow 0.12s;
    min-height: 38px;
}
input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-muted);
}
input::placeholder { color: #A1A1AA; }

.submit-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    width: 100%;
    padding: 0.575rem 1rem;
    font-size: 0.875rem;
    font-weight: 600;
    font-family: inherit;
    border: 1px solid var(--primary);
    border-radius: 6px;
    cursor: pointer;
    background: var(--primary);
    color: #fff;
    transition: background 0.1s, border-color 0.1s;
    min-height: 40px;
    margin-top: 1.25rem;
}
.submit-btn:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
.submit-btn:active { transform: translateY(1px); }

.alert {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 0.7rem 0.875rem;
    border-radius: 6px;
    font-size: 0.84rem;
    margin-bottom: 1.25rem;
    background: var(--danger-bg);
    color: var(--danger);
    border: 1px solid var(--danger-border);
}
</style>
</head>
<body>
<div class="login-wrap">
    <div class="brand">
        <svg class="brand-icon" viewBox="0 0 32 32">
            <rect width="32" height="32" rx="7" fill="currentColor"/>
            <rect x="5" y="8"  width="16" height="3.5" rx="1.75" fill="white"/>
            <rect x="5" y="14" width="11" height="3.5" rx="1.75" fill="white" opacity="0.6"/>
            <rect x="5" y="20" width="6"  height="3.5" rx="1.75" fill="white" opacity="0.3"/>
            <circle cx="26" cy="9.75" r="3.75" fill="#F59E0B"/>
        </svg>
        <span class="brand-name">Kanban</span>
    </div>

    <div class="login-card">
        <h1 class="login-title">Sign in</h1>
        <p class="login-sub">Use your work email and password to continue.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for _, message in messages %}
            <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="post" action="{{ url_for('auth.login', next=request.args.get('next', '')) }}">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                       autocomplete="email" autofocus required
                       placeholder="you@example.com">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       autocomplete="current-password" required
                       placeholder="••••••••">
            </div>
            <button type="submit" class="submit-btn">Sign in</button>
        </form>
    </div>
</div>
</body>
</html>
