<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bin Label - {{ bin.location }}</title>
    <style>
        @page {
            size: 3.5in 1in;
            margin: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .label-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .bin-label {
            background: white;
            border: 2px solid #333;
            border-radius: 4px;
            width: 3.5in;
            height: 1in;
            padding: 0 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            page-break-inside: avoid;
        }

        .label-location {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 1px;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .label-description {
            font-size: 11px;
            color: #444;
            line-height: 1.2;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .no-print {
            text-align: center;
            margin-bottom: 20px;
        }

        .copies-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .copies-control label {
            font-size: 14px;
            font-weight: 500;
        }

        .copies-control input {
            width: 60px;
            padding: 6px 8px;
            font-size: 14px;
            border: 2px solid #ddd;
            border-radius: 6px;
            text-align: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            background: #0d6efd;
            color: white;
            margin-right: 10px;
        }

        .btn:hover {
            background: #0b5ed7;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5c636a;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .no-print {
                display: none;
            }

            .label-container {
                display: block;
            }

            .bin-label {
                border-radius: 0;
                margin: 0;
                page-break-inside: avoid;
                break-inside: avoid;
                page-break-after: always;
                break-after: page;
            }

            .bin-label:last-child {
                page-break-after: auto;
                break-after: auto;
            }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <div class="copies-control">
            <label for="copies">Number of labels:</label>
            <input type="number" id="copies" value="1" min="1" max="100">
            <button class="btn" onclick="updateCopies()">Update</button>
        </div>
        <button class="btn" onclick="window.print()">
            Print Labels
        </button>
        <a href="{{ url_for('bins.detail', id=bin.id) }}" class="btn btn-secondary">
            Back to Bin
        </a>
    </div>

    <div class="label-container" id="labelContainer">
        <div class="bin-label">
            <div class="label-location">{{ bin.location }}</div>
            {% if bin.description %}
            <div class="label-description">{{ bin.description }}</div>
            {% endif %}
        </div>
    </div>

    <script>
        function updateCopies() {
            const count = Math.max(1, Math.min(100, parseInt(document.getElementById('copies').value) || 1));
            document.getElementById('copies').value = count;
            const container = document.getElementById('labelContainer');
            const template = container.querySelector('.bin-label').cloneNode(true);
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                container.appendChild(template.cloneNode(true));
            }
        }
    </script>
</body>
</html>
